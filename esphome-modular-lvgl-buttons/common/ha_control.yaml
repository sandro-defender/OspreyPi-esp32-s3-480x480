# Expose simple buzzer control to Home Assistant

esphome:
  on_boot:
    - priority: -100
      then:
        - if:
            condition:
              lambda: 'return id(display_rotation_select).state == "0";'
            then:
              - lvgl.display.set_rotation:
                  rotation: 0
        - if:
            condition:
              lambda: 'return id(display_rotation_select).state == "90";'
            then:
              - lvgl.display.set_rotation:
                  rotation: 90
        - if:
            condition:
              lambda: 'return id(display_rotation_select).state == "180";'
            then:
              - lvgl.display.set_rotation:
                  rotation: 180
        - if:
            condition:
              lambda: 'return id(display_rotation_select).state == "270";'
            then:
              - lvgl.display.set_rotation:
                  rotation: 270

switch:
  - platform: template
    name: "Buzzer"
    id: ha_buzzer_switch
    icon: mdi:volume-high
    turn_on_action:
      # Set to 50% duty cycle for best sound on passive buzzer
      - output.set_level:
          id: buzzer_output
          level: 50%
    turn_off_action:
      - output.turn_off: buzzer_output

button:
  - platform: template
    name: "Exit Screensaver"
    id: ha_exit_screensaver
    icon: mdi:monitor-eye
    on_press:
      - logger.log: "Exiting screensaver via HA"
      - lvgl.resume
      - lvgl.widget.redraw
      - lvgl.page.show: main_page
      # Restore backlight based on current mode
      - if:
          condition:
            - lambda: 'return id(brightness_mode).current_option() == "Day";'
          then:
            - light.turn_on:
                id: display_backlight
                brightness: ${touchscreen_daytime_brightness}
      - if:
          condition:
            - lambda: 'return id(brightness_mode).current_option() == "Evening";'
          then:
            - light.turn_on:
                id: display_backlight
                brightness: ${touchscreen_nighttime_brightness}
      - if:
          condition:
            - lambda: 'return id(brightness_mode).current_option() == "Night";'
          then:
            - light.turn_on:
                id: display_backlight
                brightness: ${touchscreen_nighttime_brightness}

select:
  - platform: template
    name: "Display Rotation"
    id: display_rotation_select
    optimistic: true
    restore_value: true
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    initial_option: "${display_rotation}"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "0";'
            then:
              - lvgl.display.set_rotation:
                  rotation: 0
        - if:
            condition:
              lambda: 'return x == "90";'
            then:
              - lvgl.display.set_rotation:
                  rotation: 90
        - if:
            condition:
              lambda: 'return x == "180";'
            then:
              - lvgl.display.set_rotation:
                  rotation: 180
        - if:
            condition:
              lambda: 'return x == "270";'
            then:
              - lvgl.display.set_rotation:
                  rotation: 270

